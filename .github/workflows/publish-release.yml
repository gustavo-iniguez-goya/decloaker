name: Publish release
on:
  push:
    tags:
      - "v*.*.*"
  # Allow to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: amd64
          - runner: ubuntu-latest
            target: 386
          - runner: ubuntu-24.04-arm
            target: arm64
          - runner: ubuntu-24.04-arm
            target: arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Set up Go 1.25.7
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.7
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v3

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          target="${{ matrix.target }}"
          echo "Compiling for $target on ${{ matrix.runner }}"
          sudo apt install libbpf-dev clang
          GOARCH=${{ matrix.target }} make
          echo "github release: ${{ github.sha }} - ${{ matrix.target }}" >> checksums.txt
          sha256sum bin/decloaker >> checksums.txt

          tar zcf "decloaker-$(date +%Y%m%d-$TAG)-${{ matrix.target }}.tar.gz" bin/decloaker README.md LICENSE checksums.txt
          cat checksums.txt
          ls -lh "decloaker-$(date +%Y%m%d-$TAG)-${{ matrix.target }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decloaker-${{ matrix.target }}
          path: decloaker-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten files
        run: |
          mkdir dist
          find artifacts -name "*.tar.gz" -exec mv {} dist/ \;

      - name: Verify
        run: ls -lh dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.tar.gz
