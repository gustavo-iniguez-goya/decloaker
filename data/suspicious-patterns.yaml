version: 1

# --- Detection methods to enable ---
detection:
  bind_mounts:
    enabled: true
    source: /proc/mounts           # path to inspect for over-mounted /proc/<pid> entries

  ebpf_compare:
    enabled: true                  # compare eBPF live task list vs /proc readdir

  cgroups:
    enabled: true
    root: /sys/fs/cgroup           # cgroup v2 root; change for cgroup v1 paths
    file_suffix: .procs            # filename suffix to look for (cgroup.procs)

  brute_force:
    enabled: false                 # expensive; enable explicitly or via --brute-force flag
    pid_max: 0                     # 0 = read from /proc/sys/kernel/pid_max dynamically
    pid_min: 1                     # start from this PID (skip 0)

  # default paths to look for hidden files or content in files
  # wildcards allowed
  default_hidden_paths:
    files:
      - "/etc/"
      - "/lib/"
      - "/usr/"
      - "/sbin/"
      - "/lib/"
      - "/var/spool/"
      - "/var/tmp/"
      - "/home/*/.config/"

    content:
      - "/etc/ld.so.preload"
      - "/etc/ld.so.conf"
      - "/etc/ld.so.conf.d/*"
      - "/etc/passwd"
      - "/etc/shadow"
      - "/etc/sudoers"
      - "/etc/motd"
      - "/etc/environment"
      - "/etc/profile"
      - "/etc/profile.d/*"
      - "/etc/rc.local"
      - "/etc/rc.d/rc.local"
      - "/etc/init.d/*"
      - "/etc/rc*.d/*"
      - "/etc/init/*"
      - "/etc/update-motd.d/*"
      - "/etc/modules"
      - "/etc/modules-load.d/*"
      - "/etc/udev/*/*"
      - "/etc/cron*/*"
      - "/etc/crontab"
      - "/etc/xdg/autostart/*"
      - "/etc/systemd/*/*/*"
      - "/usr/lib/modules-load.d/*"
      - "/var/spool/*/*/*"
      - "/home/*/.bashrc"
      - "/home/*/.config/autostart/*"
      - "/home/*/.config/systemd/*/*"
      - "/lib/systemd/*/*"
      - "/usr/lib/systemd/*/*"
      - "/root/*"
      - "/proc/net/*"

# --- Per-process attribute patterns (applied to every visible PID) ---
patterns:
  process:
  - type: cmdline
    data_type: regex
    operand: equals
    data: "^(\\[|)(kthread|kworker|ksoft|kcompact|kdev|ksoftirqd|kaudit|khung|kdev|kswap|oom_|irq|rcu_|psimon|migration|watchdog|idle)"
    severity: critical
    description: "Userspace process impersonating a kernel thread"
    patterns:
      - type: ppid
        data_type: int
        operand: ">"
        data: 2

  - type: cmdline
    data: "^\\/dev\\/(tcp|udp)"
    data_type: string
    operand: contains
    severity: critical
    description: "Bash /dev/tcp|udp redirection (reverse shell)"

  # common reverse shells
  - type: cmdline
    data: "python(2|2\\.[1-9]|3|3\\.[1-9]|) -c.*import.*socket.*AF_INET"
    data_type: regex
    operand: equals
    severity: critical
    description: "python reverse shell"

  - type: cmdline
    data: "ruby -rsocket -e"
    data_type: regex
    operand: equals
    severity: critical
    description: "ruby reverse shell"

  - type: cmdline
    data: "nc.*(-e|-c).*sh"
    data_type: regex
    operand: equals
    severity: critical
    description: "netcat reverse shell"

  - type: cmdline
    data: "openssl s_client.*(-quiet|-connect)"
    data_type: regex
    operand: equals
    severity: critical
    description: "OpenSSL reverse shell"

  - type: cmdline
    data: "awk.*\\/inet\\/(udp|tcp)"
    data_type: regex
    operand: equals
    severity: critical
    description: "awk reverse shell"

  - type: cmdline
    data: "new Socket.*(getInputStream|getErrorStream|getOutputStream)"
    data_type: regex
    operand: equals
    severity: critical
    description: "java reverse shell"

  - type: cmdline
    data: "lua -e.*require('socket')"
    data_type: regex
    operand: equals
    severity: critical
    description: "lua reverse shell"

  - type: cmdline
    data: "perl -e.*(use Socket|new IO::Socket)"
    data_type: regex
    operand: equals
    severity: critical
    description: "perl reverse shell"

  - type: cmdline
    data: "socat.*(FILE|TCP-CONNECT|TCP-LISTEN|EXEC|TCP):"
    data_type: regex
    operand: equals
    severity: critical
    description: "socat reverse shell"

  # paths suspicious patterns
  - type: exe
    data: "ld-linux"
    data_type: string
    operand: contains
    severity: high
    description: "libc dynamic linker/loader used to execute a process (man ld-linux.so)"
  - type: exe
    data: "^(\\/tmp/|\\/dev\\/shm|\\/var\\/tmp|\\/run)"
    data_type: regex
    operand: equal
    severity: high
    description: "Executable running from temporary directories"
  - type: exe
    data: "^\\/memfd"
    data_type: regex
    operand: equal
    severity: high
    description: "Executable running from memory (/memfd)"
  - type: exe
    data: "^/proc"
    data_type: regex
    operand: equal
    severity: high
    description: "Executable launched from /proc (such as a file descriptor)"

  # process names suspicious patterns
  - type: comm
    data: "^\\."
    data_type: regex
    operand: equal
    severity: medium
    description: "Process comm starts with a dot (hidden name)"
  - type: comm
    data: ""
    data_type: string
    operand: equal
    severity: medium
    description: "Process name (comm) empty (??)"

# --- Allowlist: never flag these even if they match above patterns ---
allowlist:
  exe_paths:
    - "^/usr/bin/"
    - "^/usr/sbin/"
    - "^/bin/"
    - "^/sbin/"
    - "^/lib/"
    - "^/lib64/"

  comm_names:
    - "sshd"
    - "systemd"
    - "dockerd"

  pids:
    - 1       # init/systemd
    - 2       # kthreadd
